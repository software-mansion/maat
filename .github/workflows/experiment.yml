name: Experiment

on:
  workflow_dispatch:
    inputs:
      workspace:
        required: true
        description: Workspace
        type: choice
        options: [ release, nightly ]
        default: release
      scarb:
        # If this input is not specified, then don't pass the --scarb option
        # to ./maat and let use the default provided by the workspace.
        required: false
        description: Scarb version
        type: string
      foundry:
        # If this input is not specified, then don't pass the --foundry option
        # to ./maat and let use the default provided by the workspace.
        required: false
        description: Starknet Foundry version
        type: string
      report_name:
        description: "Custom report name"
        required: false
        type: string
      extra_env:
        description: "Extra env (space-separated KEY=VALUE pairs passed to all steps)"
        required: false
        type: string
      notify_team:
        description: "Notify team (if you want the whole team to check the run)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}/${{ inputs.workspace }}/${{ inputs.scarb }}/${{ inputs.foundry }}/${{ inputs.report_name }}
  cancel-in-progress: true

run-name: >-
  experiment
  w=${{ inputs.workspace }}
  ${{ inputs.scarb && format('scarb={0}', inputs.scarb) }}
  ${{ inputs.foundry && format('foundry={0}', inputs.foundry) }}
  ${{ inputs.report_name && format('name={0}', inputs.report_name) }}

env:
  PARTITIONS_COUNT: 4
  UV_FROZEN: 1

jobs:
  plan:
    permissions:
      packages: write
    runs-on: ubuntu-latest
    outputs:
      partition-array: ${{ steps.generate-partitions.outputs.partition-array }}
      sandbox-digest: ${{ steps.sandbox-digest.outputs.sandbox-digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build sandbox image
        run: >-
          ./maat build-sandbox
          --workspace "${{ inputs.workspace }}"
          ${{ inputs.scarb && format('--scarb "{0}"', inputs.scarb) }}
          ${{ inputs.foundry && format('--foundry "{0}"', inputs.foundry) }}
          --iidfile iidfile.txt
          --cache-from "type=gha"
          --cache-to "type=gha,mode=max,ghtoken=${{ secrets.GITHUB_TOKEN }}"

      - name: Push sandbox image to GitHub Container Registry
        run: docker push --all-tags ghcr.io/software-mansion/maat/sandbox

      - name: Get sandbox image digest
        id: sandbox-digest
        run: |
          IMAGE_ID="$(cat iidfile.txt)"
          DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE_ID)"
          echo "SANDBOX_DIGEST=$DIGEST" >> $GITHUB_ENV
          echo "sandbox-digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Normalize report name
        run: |
          NAME="${{ inputs.report_name }}"
          if [[ -n "$NAME" && "$NAME" != release-* && "$NAME" != nightly-* && "$NAME" != custom-* ]]; then
            NAME="custom-$NAME"
          fi
          echo "NORMALIZED_REPORT_NAME=$NAME" >> $GITHUB_ENV

      - name: Create plan
        env:
          EXTRA_ENV: ${{ inputs.extra_env }}
        run:
          ./maat plan
          --workspace "${{ inputs.workspace }}"
          --pull "${{ env.SANDBOX_DIGEST }}"
          --output maat-plan.json
          --partitions ${{ env.PARTITIONS_COUNT }}
          ${{ env.NORMALIZED_REPORT_NAME && format('--report-name "{0}"', env.NORMALIZED_REPORT_NAME) }}
          ${{ inputs.extra_env && '--extra-env "$EXTRA_ENV"' }}

      - name: Generate partition array
        id: generate-partitions
        run: |
          # Generate a JSON array of numbers from 0 to PARTITIONS_COUNT-1.
          ARRAY=$(python -c "import json; print(json.dumps(list(range(${{ env.PARTITIONS_COUNT }}))))")
          echo "partition-array=$ARRAY" >> $GITHUB_OUTPUT

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: maat-plan
          path: maat-plan.json

  # Each partition runs on a dedicated, freshly created GCP VM which is deleted
  # as soon as the partition finishes. The job itself stays on a GitHub runner
  # and only drives the VM over SSH -- GitHub runners have no CPU model
  # guarantee, so nothing timing-sensitive may happen here.
  # See docs/gcp-runners.md for the one-time project setup this needs.
  run:
    permissions:
      contents: read
      packages: read
      id-token: write
    runs-on: ubuntu-latest
    needs: plan
    strategy:
      matrix:
        # Dynamically generated array based on PARTITIONS_COUNT
        partition: ${{ fromJSON(needs.plan.outputs.partition-array) }}
      fail-fast: true
    env:
      VM_NAME: maat-${{ github.run_id }}-${{ github.run_attempt }}-p${{ matrix.partition }}
      ZONE: ${{ vars.GCP_ZONE }}
      MACHINE_TYPE: ${{ vars.GCP_MACHINE_TYPE || 'c4-standard-16' }}
      EXPECTED_CPU_MODEL: ${{ vars.EXPECTED_CPU_MODEL }}
      NETWORK: ${{ vars.GCP_NETWORK || 'maat-net' }}
      SUBNET: ${{ vars.GCP_SUBNET || 'maat-subnet' }}
      # gcloud generates an SSH key on first use and would otherwise prompt.
      CLOUDSDK_CORE_DISABLE_PROMPTS: 1
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: maat-plan
          path: .

      # --max-run-duration is the backstop against leaked VMs. The teardown step
      # below covers normal failures, but not a cancelled workflow or a dead
      # runner -- and `cancel-in-progress: true` above makes cancellation
      # routine. This makes GCP delete the VM regardless of what happens here.
      # Experiment VMs build arbitrary third-party Cairo packages, so they are
      # kept off any network carrying real infrastructure: a dedicated VPC with
      # no peering, no internal egress, no service account, and no API scopes.
      # scripts/gcp/setup-network.sh creates that network; the "Network
      # isolation" section of docs/gcp-runners.md explains the boundary.
      - name: Create VM
        run: |
          gcloud compute instances create "$VM_NAME" \
            --zone="$ZONE" \
            --machine-type="$MACHINE_TYPE" \
            --threads-per-core=1 \
            --image-family=ubuntu-2404-lts-amd64 \
            --image-project=ubuntu-os-cloud \
            --boot-disk-size=200GB \
            --boot-disk-type=hyperdisk-balanced \
            --network="$NETWORK" \
            --subnet="$SUBNET" \
            --tags=maat-runner \
            --metadata=enable-oslogin=TRUE \
            --metadata-from-file=startup-script=scripts/gcp/startup.sh \
            --no-service-account --no-scopes \
            --max-run-duration=6h \
            --instance-termination-action=DELETE \
            --labels=maat-run=${{ github.run_id }},maat-partition=${{ matrix.partition }}

      - name: Wait for VM to finish provisioning
        run: |
          for _ in $(seq 1 60); do
            if gcloud compute ssh "$VM_NAME" --zone="$ZONE" --tunnel-through-iap \
                --command='test -f /var/lib/maat-ready' 2>/dev/null; then
              echo "VM is ready"
              exit 0
            fi
            sleep 10
          done
          echo "::error::VM did not become ready within 10 minutes"
          gcloud compute instances get-serial-port-output "$VM_NAME" --zone="$ZONE" || true
          exit 1

      # Group membership only applies to sessions opened after this one, which
      # is why this cannot be folded into the run step below.
      - name: Grant the SSH user access to Docker
        run: |
          gcloud compute ssh "$VM_NAME" --zone="$ZONE" --tunnel-through-iap \
            --command='sudo usermod -aG docker "$(whoami)"'

      - name: Upload Ma'at sources and plan
        run: |
          git archive --format=tar.gz -o maat-src.tar.gz HEAD
          gcloud compute scp --zone="$ZONE" --tunnel-through-iap \
            maat-src.tar.gz maat-plan.json "$VM_NAME:~/"
          gcloud compute ssh "$VM_NAME" --zone="$ZONE" --tunnel-through-iap --command='
            set -eux
            mkdir -p ~/maat
            tar -xzf ~/maat-src.tar.gz -C ~/maat
            mv ~/maat-plan.json ~/maat/
            cd ~/maat && uv sync
          '

      - name: Verify the VM landed on the expected CPU
        run: |
          gcloud compute ssh "$VM_NAME" --zone="$ZONE" --tunnel-through-iap \
            --command="EXPECTED_CPU_MODEL='$EXPECTED_CPU_MODEL' bash ~/maat/scripts/gcp/assert-cpu.sh"

      - name: Login to GitHub Container Registry
        run: |
          printf '%s' '${{ secrets.GITHUB_TOKEN }}' | \
            gcloud compute ssh "$VM_NAME" --zone="$ZONE" --tunnel-through-iap \
              --command='docker login ghcr.io -u ${{ github.actor }} --password-stdin'

      - name: Pull sandbox image from GitHub Container Registry
        run: |
          gcloud compute ssh "$VM_NAME" --zone="$ZONE" --tunnel-through-iap \
            --command='docker pull "${{ needs.plan.outputs.sandbox-digest }}"'

      - name: Run plan partition
        run: |
          gcloud compute ssh "$VM_NAME" --zone="$ZONE" --tunnel-through-iap \
            --command='cd ~/maat && ./maat run-plan --partition ${{ matrix.partition }} --jobs 1 maat-plan.json'

      - name: Fetch generated partial report
        run: |
          REPORT_NAME=$(jq -r '.report_name' maat-plan.json)
          REPORT_PATH="reports/${REPORT_NAME}-${{ matrix.partition }}.json"
          mkdir -p reports
          if ! gcloud compute scp --zone="$ZONE" --tunnel-through-iap \
              "$VM_NAME:maat/${REPORT_PATH}" "$REPORT_PATH"; then
            echo "::error::Report file not found on VM at ${REPORT_PATH}"
            exit 1
          fi
          echo "REPORT_PATH=$REPORT_PATH" >> $GITHUB_ENV

      - name: Upload partial report
        uses: actions/upload-artifact@v4
        with:
          name: maat-report-part-${{ matrix.partition }}
          path: ${{ env.REPORT_PATH }}

      - name: Delete VM
        if: always()
        run: |
          gcloud compute instances delete "$VM_NAME" --zone="$ZONE" --quiet \
            || echo "::warning::Could not delete $VM_NAME; --max-run-duration will reap it"

  commit:
    permissions:
      contents: write
      id-token: write
      actions: write
    needs: run
    runs-on: ubuntu-latest
    env:
      PARTIAL_REPORTS_PATH: /tmp/maat-reports
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync

      - name: Set up Git configuration
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: maat-plan
          path: .

      - name: Download all partial reports
        uses: actions/download-artifact@v4
        with:
          pattern: maat-report-part-*
          path: ${{ env.PARTIAL_REPORTS_PATH }}
          merge-multiple: true

      - name: Extract report name from plan
        run: |
          # Get the report name from the plan file
          REPORT_NAME=$(jq -r '.report_name' maat-plan.json)
          echo "REPORT_NAME=$REPORT_NAME" >> $GITHUB_ENV

      - name: Merge reports
        run: >-
          ./maat merge-reports
          --output "${{ env.PARTIAL_REPORTS_PATH }}/${{ env.REPORT_NAME }}.json"
          $(find ${{ env.PARTIAL_REPORTS_PATH }} -name "*.json" | tr '\n' ' ')

      - run: git pull --ff-only
      - run: mv "${{ env.PARTIAL_REPORTS_PATH }}/${{ env.REPORT_NAME }}.json" "reports/${{ env.REPORT_NAME }}.json"
      - run: git add "reports/${{ env.REPORT_NAME }}.json"
      - run: "git commit -m 'experiment: ${{ env.REPORT_NAME }}'"
      - run: git push

      - name: Trigger Web workflow
        if: github.ref == 'refs/heads/main'
        run: gh workflow run web.yml --ref "${{ github.ref }}" -f experiment_name="${{ env.REPORT_NAME }}" -f notify_team=${{ inputs.notify_team }}
        env:
          GH_TOKEN: ${{ github.token }}
